{% extends "base.html" %}
{% block title %}Registro - SaldoPlus{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Crear Cuenta</h2>
        <form method="POST">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" name="nombre" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" name="password" required placeholder="Minimo 6 caracteres" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
        </form>
        <p class="auth-link">Ya tienes cuenta? <a href="{{ url_for('login') }}">Ingresa</a></p>
    </div>
</div>
{% endblock %}
