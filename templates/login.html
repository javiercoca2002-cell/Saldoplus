
{% extends "base.html" %}
{% block title %}Iniciar Sesion - SaldoPlus{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Iniciar Sesion</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 20px;">Accede a tu panel para invertir y multiplicar tu saldo.</p>
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
        <p class="auth-link">No tienes cuenta? <a href="{{ url_for('registro') }}">Registrate aqui</a></p>
    </div>
</div>
{% endblock %}
